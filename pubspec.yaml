name: mago_widgets
description: "A reusable Flutter widget library with dark/light theme support."
version: 0.0.1
homepage:
publish_to: none

environment:
  sdk: ^3.6.1
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  file_picker: ^8.3.7              # was ^10.3.10
  flutter_cache_manager: ^3.4.1
  flutter_inappwebview: ^6.1.5
  flutter_svg: ^2.0.17
  http: ^1.2.2
  image: ^4.3.0
  lucide_icons_flutter: ^3.1.8
  media_kit: ^1.2.3
  media_kit_video: ^2.0.1
  media_kit_libs_windows_video: ^1.0.11
  media_kit_libs_macos_video: ^1.1.4
  media_kit_libs_android_video: ^1.3.8
  media_kit_libs_ios_video: ^1.1.4
  path_provider: ^2.1.5
  pdfrx: ^2.1.3                    # was ^1.0.98
  pdfrx_engine: ^0.1.12            # was ^0.3.0
  permission_handler: ^11.3.1      # was ^12.0.1
  pretty_qr_code: ^3.3.0
  three_js: ^0.2.7
  three_js_controls: ^0.2.2
  three_js_math: ^0.2.6
  youtube_explode_dart: ^3.0.5
  youtube_player_iframe: ^5.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  three_js_core:
    git:
      url: https://github.com/Philip-Remago/flutter_three_js.git
      ref: main
      path: packages/three_js_core

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # To add assets to your package, add an assets section, like this:
  assets:
    - assets/images/defaults/icons/file.png
    - assets/images/defaults/icons/note.png
    - assets/images/defaults/logo/pinecone.dark.svg
    - assets/images/defaults/logo/pinecone.light.svg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
